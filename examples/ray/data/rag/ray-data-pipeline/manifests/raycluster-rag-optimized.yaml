# RayCluster for RAG ingestion workloads (CPU + GPU)
#
# Key settings:
# - Image has Docling + Ray + vLLM required
# - CPU workers: 4 CPU, 16Gi memory (for Docling parsing + Milvus writes)
# - GPU workers: 1 GPU, 16Gi memory (for vLLM embedding)
# - Head: object-store-memory set for Ray Data throughput
#
# Replace the image below with your container image you that has
# Docling + Ray + vLLM installed. See the below link for an example Dockerfile:
# https://github.com/opendatahub-io/distributed-workloads/tree/main/images/runtime/examples/ray-data-rag
---
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raytest
  namespace: rag-example
  labels:
    app: raytest
spec:
  rayVersion: "2.54.1"

  enableInTreeAutoscaling: false

  headGroupSpec:
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-cpus: "0"
      object-store-memory: "5368709120"  # 5Gi
      disable-usage-stats: "true"
      no-monitor: "true"
    template:
      metadata:
        labels:
          app: raytest
          ray.io/cluster: raytest
          ray.io/group: head
      spec:
        containers:
          - name: ray-head
            image: <your-image>:latest
            imagePullPolicy: Always
            ports:
              - containerPort: 6379
                name: gcs
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
            env:
              - name: RAY_USE_TLS
                value: "0"
              - name: RAY_DEFAULT_OBJECT_STORE_MEMORY_PROPORTION
                value: "0.5"
            resources:
              limits:
                cpu: "2"
                memory: 10Gi
              requests:
                cpu: "1"
                memory: 6Gi
            volumeMounts:
              - mountPath: /mnt/data
                name: shared-data
        volumes:
          - name: shared-data
            persistentVolumeClaim:
              claimName: rag-data-pvc

  workerGroupSpecs:
    - groupName: cpu-workers
      replicas: 8
      minReplicas: 8
      maxReplicas: 8
      rayStartParams:
        num-cpus: "4"
        object-store-memory: "8589934592"  # 8Gi
      template:
        metadata:
          labels:
            app: raytest
            ray.io/cluster: raytest
            ray.io/group: cpu-workers
        spec:
          containers:
            - name: ray-worker
              image: <your-image>:latest
              imagePullPolicy: Always
              env:
                - name: RAY_USE_TLS
                  value: "0"
                - name: RAY_DEFAULT_OBJECT_STORE_MEMORY_PROPORTION
                  value: "0.5"
              resources:
                limits:
                  cpu: "4"
                  memory: 16Gi
                requests:
                  cpu: "4"
                  memory: 16Gi
              volumeMounts:
                - mountPath: /mnt/data
                  name: shared-data
          volumes:
            - name: shared-data
              persistentVolumeClaim:
                claimName: rag-data-pvc

    - groupName: gpu-workers
      replicas: 1
      minReplicas: 1
      maxReplicas: 1
      rayStartParams:
        num-cpus: "2"
        num-gpus: "1"
        object-store-memory: "4294967296"  # 4Gi
      template:
        metadata:
          labels:
            app: raytest
            ray.io/cluster: raytest
            ray.io/group: gpu-workers
        spec:
          containers:
            - name: ray-gpu-worker
              image: <your-image>:latest
              imagePullPolicy: Always
              env:
                - name: RAY_USE_TLS
                  value: "0"
                - name: RAY_DEFAULT_OBJECT_STORE_MEMORY_PROPORTION
                  value: "0.5"
              resources:
                limits:
                  cpu: "2"
                  memory: 16Gi
                  nvidia.com/gpu: "1"
                requests:
                  cpu: "2"
                  memory: 16Gi
                  nvidia.com/gpu: "1"
              volumeMounts:
                - mountPath: /mnt/data
                  name: shared-data
          volumes:
            - name: shared-data
              persistentVolumeClaim:
                claimName: rag-data-pvc
